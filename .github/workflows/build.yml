name: VX Launcher Build Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code Base
      uses: actions/checkout@v4

    - name: Set up Modern Java Development Kit
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK Environment
      uses: android-actions/setup-android@v3

    - name: Initialize Local Android Directory Structure
      run: |
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/java/com/vx/launcher
        mv activity_splash.xml app/src/main/res/layout/ || true
        mv MainActivity.java app/src/main/java/com/vx/launcher/ || true
        mv ZyronModStoreCore.java app/src/main/java/com/vx/launcher/ || true
        mv AndroidManifest.xml app/src/main/ || true
        mv build.gradle app/ || true

    - name: Grant Execute Permissions for Builder
      run: |
        chmod +x gradlew || true
        gradle wrapper || true

    - name: Compile and Build APK Android Application
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished Production APK
      uses: actions/upload-artifact@v4
      with:
        name: VX-Launcher-Artifact
        path: "**/build/outputs/apk/debug/*.apk"
        if-no-files-found: warn
